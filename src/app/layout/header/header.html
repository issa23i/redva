<header class="site-header">
  <nav class="site-header__nav app-container" aria-label="Navegacion principal">
    <a class="brand" routerLink="/" (click)="closeMenu($event)" aria-label="RedVA inicio">
      <img [src]="logoPath" alt="RedVA" />
      <span>RedVA</span>
    </a>

    <button
      class="menu-toggle"
      type="button"
      [attr.aria-expanded]="menuOpen"
      aria-controls="primary-menu"
      (click)="toggleMenu()"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>

    <div id="primary-menu" class="site-header__links" [class.is-open]="menuOpen">
      @for (item of navLinks; track item.path) {
        @if (item.path === '/federaciones') {
          <div
            class="nav-dropdown"
            [class.is-open]="dropdownOpen"
            [class.is-closed]="dropdownClosed"
            (mouseenter)="openDropdown()"
            (mouseleave)="resetDropdown()"
          >
            <a
              [routerLink]="item.path"
              routerLinkActive="is-active"
              [routerLinkActiveOptions]="{ exact: true }"
              (click)="toggleDropdown($event)"
            >
              {{ item.label }}
            </a>
            <div class="nav-dropdown__panel">
              @for (federation of federations; track federation.province) {
                <a
                  routerLink="/federaciones"
                  [fragment]="federationFragment(federation)"
                  (click)="closeMenu($event)"
                >
                  {{ federation.province }}
                </a>
              }
            </div>
          </div>
        } @else {
          <a
            [routerLink]="item.path"
            routerLinkActive="is-active"
            [routerLinkActiveOptions]="{ exact: item.path !== '/noticias' }"
            (click)="closeMenu($event)"
          >
            {{ item.label }}
          </a>
        }
      }
      <a class="button button--primary button--small" routerLink="/ilp-vivienda" (click)="closeMenu($event)">Participar</a>
    </div>
  </nav>
</header>
